<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palace's RPG Save Stopwatch</title>
<style>
body {
background-color: transparent;
margin: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
padding: 20px;
box-sizing: border-box;
position: relative;
overflow: hidden; /* ป้องกัน scrollbar โผล่เวลากดขยายขนาด */
}

/* คอนเทนเนอร์หลักสำหรับควบคุมการย่อขยายแบบคงสัดส่วน และบังคับกึ่งกลางเสมอ */
.scaler-wrapper {
transform-origin: center center;
transition: transform 0.2s ease;
display: flex;
justify-content: center;
align-items: center;
position: relative;
}

.widget-container {
background: #FDF3F2; /* Creamy pastel */
border: 2px solid #8B0016; /* Deep Burgundy Crimson */
border-radius: 20px;
padding: 24px;
width: 280px;
/* ปรับตัวนี้เป็น Flex Column เพื่อจัดระเบียบทุกองค์ประกอบให้อยู่แกนกลางเป๊ะๆ */
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
box-shadow: 4px 4px 0px #8B0016; /* Retro 2D Shadow */
color: #8B0016;
box-sizing: border-box;
position: relative;
}

/* ตัวควบคุมขนาดมินิมอลแบบซ่อนอัตโนมัติ (จะโผล่มาเมื่อ Hover เท่านั้น) */
.scale-control-box {
position: absolute;
top: 10px;
right: 14px;
display: flex;
align-items: center;
gap: 5px;
font-size: 0.6rem;
font-weight: 800;
letter-spacing: 0.5px;
opacity: 0; /* ซ่อนไว้ก่อน */
transform: translateY(-3px);
transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
z-index: 10;
pointer-events: none;
}

/* แสดงขึ้นมาเมื่อเลื่อนเมาส์มาโดนบริเวณมุมขวาบนของ Widget Container */
.widget-container:hover .scale-control-box,
.scale-control-box:focus-within {
opacity: 0.7;
transform: translateY(0);
pointer-events: auto;
}

.scale-control-box:hover {
opacity: 1 !important;
}

.scale-input {
width: 32px;
background: #ffffff;
border: 1.5px solid #8B0016;
border-radius: 6px;
color: #8B0016;
font-size: 0.65rem;
font-weight: bold;
text-align: center;
outline: none;
padding: 2px;
box-shadow: 1px 1px 0px #8B0016;
transition: all 0.2s;
}

.scale-input:focus {
box-shadow: 2px 2px 0px #8B0016;
background: #FDF3F2;
}

/* Editable Title Styled like a clean input */
.title-input {
background: transparent;
border: none;
border-bottom: 2px dashed #8b001680;
color: #8B0016;
font-size: 0.85rem;
font-weight: 800;
text-align: center;
text-transform: uppercase;
letter-spacing: 1.5px;
width: 90%;
margin-bottom: 10px;
outline: none;
padding: 4px 0;
transition: border-color 0.2s;
display: block; /* บังคับเป็น block เพื่อให้อยู่กึ่งกลางง่ายขึ้น */
}
.title-input:focus {
border-bottom-color: #8B0016;
}
.timer-display {
font-size: 3rem;
font-weight: 800;
font-variant-numeric: tabular-nums;
margin: 5px 0 20px 0;
letter-spacing: 1px;
color: #8B0016;
width: 100%;
text-align: center;
}
.control-buttons {
display: flex;
justify-content: space-between;
gap: 10px;
margin-bottom: 16px;
width: 100%; /* แผ่ให้เต็มกรอบความกว้างของ Widget */
box-sizing: border-box;
}
.btn {
background-color: #ffffff;
color: #8B0016;
border: 2px solid #8B0016;
border-radius: 12px;
padding: 10px;
font-size: 0.82rem;
font-weight: bold;
text-transform: uppercase;
cursor: pointer;
flex: 1;
transition: all 0.2s ease;
box-shadow: 2px 2px 0px #8B0016;
}
.btn:hover {
transform: translate(-1px, -1px);
box-shadow: 3px 3px 0px #8B0016;
}
.btn:active {
transform: translate(1px, 1px);
box-shadow: 1px 1px 0px #8B0016;
}
.btn-start {
background-color: #8B0016;
color: #FDF3F2;
border: 2px solid #8B0016;
}
.btn-start:hover {
background-color: #a31226;
}
.save-button {
background-color: #f1dbda;
color: #b07c7c;
border: 2px solid #b07c7c;
border-radius: 12px;
padding: 12px;
font-size: 0.85rem;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 0.5px;
cursor: not-allowed;
width: 100%;
box-sizing: border-box;
transition: all 0.3s ease;
}
.save-button.active {
background-color: #8B0016;
color: #FDF3F2;
border: 2px solid #8B0016;
box-shadow: 2px 2px 0px #3c0006;
cursor: pointer;
}
.save-button.active:hover {
background-color: #a31226;
transform: translateY(-1px);
}

/* Save Game List Section */
.save-list-section {
margin-top: 20px;
border-top: 2px dashed #8b001640;
padding-top: 15px;
text-align: left;
width: 100%; /* แผ่กว้างเต็มกรอบ */
box-sizing: border-box;
}
.save-list-title {
font-size: 0.75rem;
font-weight: bold;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 5px;
color: #8B0016;
text-align: center;
cursor: pointer;
user-select: none;
display: flex;
justify-content: center;
align-items: center;
gap: 6px;
}
.save-list-title::after {
content: '▲';
font-size: 0.6rem;
transition: transform 0.3s ease;
}
.save-list-section.collapsed .save-list-title::after {
transform: rotate(180deg);
}
.save-list-container {
max-height: 150px;
overflow-y: auto;
transition: max-height 0.3s ease, opacity 0.3s ease;
opacity: 1;
width: 100%;
}
.save-list-section.collapsed .save-list-container {
max-height: 0px;
opacity: 0;
overflow: hidden;
}
.save-list {
list-style: none;
padding: 0;
margin: 0;
width: 100%;
}
/* Custom thin scrollbar for minimalist look */
.save-list-container::-webkit-scrollbar {
width: 4px;
}
.save-list-container::-webkit-scrollbar-thumb {
background: #8B0016;
border-radius: 4px;
}
.save-item {
display: flex;
justify-content: space-between;
align-items: center;
background: #ffffff;
border: 1.5px solid #8B0016;
border-radius: 10px;
padding: 8px 10px;
margin-bottom: 8px;
box-shadow: 2px 2px 0px #8B0016;
box-sizing: border-box;
}
.save-info {
overflow: hidden;
display: flex;
flex-direction: column;
flex: 1;
margin-right: 8px;
}
.save-name-container {
display: flex;
align-items: center;
gap: 4px;
}
.save-name {
font-size: 0.8rem;
font-weight: bold;
color: #8B0016;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
cursor: pointer;
border: 1px solid transparent;
padding: 1px 3px;
border-radius: 4px;
}
.save-name:hover {
background: #f1dbda40;
border-color: #8b001630;
}
.save-name-input {
font-size: 0.8rem;
font-weight: bold;
color: #8B0016;
border: 1px solid #8B0016;
background: #FDF3F2;
border-radius: 4px;
padding: 1px 3px;
width: 90%;
outline: none;
}
.edit-icon {
font-size: 0.65rem;
opacity: 0.4;
cursor: pointer;
}
.edit-icon:hover {
opacity: 1;
}
.save-time {
font-size: 0.7rem;
color: #8b0016a0;
padding-left: 3px;
}
.save-actions {
display: flex;
gap: 5px;
}
.action-btn {
background: #ffffff;
border: 1.5px solid #8B0016;
border-radius: 6px;
color: #8B0016;
font-size: 0.7rem;
font-weight: bold;
text-transform: uppercase;
cursor: pointer;
padding: 3px 6px;
transition: all 0.2s;
}
.action-btn:hover {
background: #8B0016;
color: #FDF3F2;
}
.btn-delete {
border-color: #999;
color: #999;
}
.btn-delete:hover {
background: #e0e0e0;
color: #333;
border-color: #333;
}

/* --- IN-WIDGET MODAL DIALOG STYLE --- */
.custom-modal-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(139, 0, 22, 0.25);
border-radius: 20px;
display: flex;
justify-content: center;
align-items: center;
z-index: 100;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease;
}
.custom-modal-overlay.active {
opacity: 1;
pointer-events: auto;
}
.custom-modal {
background: #FDF3F2;
border: 2px solid #8B0016;
border-radius: 16px;
padding: 16px;
width: 85%;
box-shadow: 4px 4px 0px #8B0016;
text-align: center;
box-sizing: border-box;
animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
from { transform: scale(0.8); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}
.modal-title {
font-size: 0.75rem;
font-weight: 800;
letter-spacing: 1px;
margin-bottom: 8px;
color: #8B0016;
text-transform: uppercase;
}
.modal-text {
font-size: 0.78rem;
line-height: 1.4;
margin-bottom: 16px;
color: #8B0016;
}
.modal-buttons {
display: flex;
gap: 8px;
}
.modal-btn {
flex: 1;
padding: 8px;
font-size: 0.75rem;
font-weight: bold;
border-radius: 8px;
text-transform: uppercase;
cursor: pointer;
border: 2px solid #8B0016;
transition: all 0.1s;
}
.modal-btn-confirm {
background: #8B0016;
color: #FDF3F2;
}
.modal-btn-confirm:hover {
background: #a31226;
}
.modal-btn-cancel {
background: #ffffff;
color: #8B0016;
}
.modal-btn-cancel:hover {
background: #f1dbda;
}
</style>
</head>
<body>

<!-- ครอบเพื่อทำระบบ Scale -->
<div class="scaler-wrapper" id="scalerWrapper">
<div class="widget-container">
<!-- ตัวควบคุมขนาดมินิมอลแบบซ่อนอัตโนมัติ (จะโผล่มาเมื่อ Hover เท่านั้น) -->
<div class="scale-control-box">
<span>SIZE:</span>
<input type="number" id="scaleInput" class="scale-input" value="1" step="0.1" min="0.3" max="3" oninput="changeWidgetScale(this.value)">
</div>

<!-- Editable Title Box -->
<input type="text" id="titleInput" class="title-input" value="Focus Session" placeholder="ENTER SESSION NAME">

<div class="timer-display" id="display">00:00:00</div>

<div class="control-buttons">
<button class="btn btn-start" id="startBtn" onclick="startTimer()">Start</button>
<button class="btn" id="pauseBtn" onclick="pauseTimer()" style="display:none;">Pause</button>
<button class="btn" id="resetBtn" onclick="resetTimer()">Reset</button>
</div>

<button class="save-button" id="saveBtn" onclick="saveGame()">Record Progress</button>

<!-- Saved Game Files (List) -->
<div class="save-list-section" id="saveListSection">
<div class="save-list-title" id="saveListToggle" onclick="toggleSaveList()">💾 Saved Files</div>
<div class="save-list-container">
<ul class="save-list" id="saveList">
<!-- Save slots will be injected here -->
</ul>
</div>
</div>

<!-- IN-WIDGET CUSTOM MODAL FOR SYSTEM DIALOGS (OVERWRITE & DELETE) -->
<div class="custom-modal-overlay" id="customModal">
<div class="custom-modal">
<div class="modal-title" id="modalTitle">⚠️ Notification</div>
<div class="modal-text" id="modalText">Message goes here...</div>
<div class="modal-buttons">
<button class="modal-btn modal-btn-confirm" id="modalConfirmBtn">Confirm</button>
<button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
</div>
</div>
</div>
</div>
</div>

<script>
let startTime = 0;
let elapsedTime = 0;
let timerInterval;
let isRunning = false;

const scalerWrapper = document.getElementById('scalerWrapper');
const scaleInput = document.getElementById('scaleInput');
const display = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const saveBtn = document.getElementById('saveBtn');
const titleInput = document.getElementById('titleInput');
const saveList = document.getElementById('saveList');
const saveListSection = document.getElementById('saveListSection');

// ดึงองค์ประกอบของ Modal
const customModal = document.getElementById('customModal');
const modalTitle = document.getElementById('modalTitle');
const modalText = document.getElementById('modalText');
const modalConfirmBtn = document.getElementById('modalConfirmBtn');

// โหลดข้อมูลบันทึกและขนาดล่าสุดจาก LocalStorage
let savedGames = JSON.parse(localStorage.getItem('palace_stopwatch_saves')) || [];
let currentScale = parseFloat(localStorage.getItem('palace_stopwatch_scale')) || 1;

// อัปเดตขนาดหน้าเว็บตามที่เคยเซฟไว้
scaleInput.value = currentScale;
changeWidgetScale(currentScale);

// ตั้งค่าตั้งต้นให้พับลิสต์
saveListSection.classList.add('collapsed');

renderSaves();

/* --- DYNAMIC SCALE FUNCTION --- */
function changeWidgetScale(val) {
let scaleValue = parseFloat(val);
if (isNaN(scaleValue) || scaleValue <= 0) scaleValue = 1; 
scalerWrapper.style.transform = `scale(${scaleValue})`;
localStorage.setItem('palace_stopwatch_scale', scaleValue);
}

function timeToString(time) {
let diffInHrs = time / 3600000;
let hh = Math.floor(diffInHrs);

let diffInMin = (diffInHrs - hh) * 60;
let mm = Math.floor(diffInMin);

let diffInSec = (diffInMin - mm) * 60;
let ss = Math.floor(diffInSec);

let formattedHH = hh.toString().padStart(2, "0");
let formattedMM = mm.toString().padStart(2, "0");
let formattedSS = ss.toString().padStart(2, "0");

return `${formattedHH}:${formattedMM}:${formattedSS}`;
}

function startTimer() {
if (isRunning) return;
isRunning = true;
startTime = Date.now() - elapsedTime;
timerInterval = setInterval(function printTime() {
elapsedTime = Date.now() - startTime;
display.innerHTML = timeToString(elapsedTime);
}, 1000);

startBtn.style.display = "none";
pauseBtn.style.display = "block";

saveBtn.classList.remove('active');
saveBtn.disabled = true;
}

function pauseTimer() {
clearInterval(timerInterval);
isRunning = false;
startBtn.style.display = "block";
startBtn.innerHTML = "Resume";
pauseBtn.style.display = "none";

if (elapsedTime > 0) {
saveBtn.classList.add('active');
saveBtn.disabled = false;
}
}

function resetTimer() {
clearInterval(timerInterval);
isRunning = false;
elapsedTime = 0;
display.innerHTML = "00:00:00";
startBtn.style.display = "block";
startBtn.innerHTML = "Start";
pauseBtn.style.display = "none";

saveBtn.classList.remove('active');
saveBtn.disabled = true;
}

function toggleSaveList() {
saveListSection.classList.toggle('collapsed');
}

/* --- GENERIC CUSTOM MODAL CONTROL --- */
function showCustomModal(title, message, confirmLabel, onConfirmCallback) {
modalTitle.innerHTML = title;
modalText.innerHTML = message;
modalConfirmBtn.innerHTML = confirmLabel;

// ผูกฟังก์ชันการทำงานเมื่อผู้ใช้กดยืนยันในกล่องโมดอล
modalConfirmBtn.onclick = function() {
onConfirmCallback();
closeModal();
};

customModal.classList.add('active');
}

function closeModal() {
customModal.classList.remove('active');
}

/* --- SAVE GAME SYSTEM --- */
function saveGame() {
if (elapsedTime === 0 || isRunning) return;

const sessionName = titleInput.value.trim() || "Untitled Session";
const durationString = timeToString(elapsedTime);
const saveId = Date.now();

const existingIndex = savedGames.findIndex(g => g.title.toLowerCase() === sessionName.toLowerCase());

// หากมีชื่อซ้ำ ให้เรียกกล่อง Custom Modal ขึ้นแจ้งเตือน Overwrite
if (existingIndex !== -1) {
const title = "⚠️ Overwrite Warning";
const message = `A record named <strong>"${sessionName}"</strong> already exists.<br><br>Do you want to overwrite it with your current progress?`;
showCustomModal(title, message, "Overwrite", function() {
savedGames[existingIndex].timeStr = durationString;
savedGames[existingIndex].ms = elapsedTime;
savedGames[existingIndex].date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

localStorage.setItem('palace_stopwatch_saves', JSON.stringify(savedGames));
renderSaves();
sendToNotionDatabase(savedGames[existingIndex]);
resetTimer();
});
return; 
}

const newSave = {
id: saveId,
title: sessionName,
timeStr: durationString,
ms: elapsedTime,
date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
};

savedGames.unshift(newSave);
localStorage.setItem('palace_stopwatch_saves', JSON.stringify(savedGames));

renderSaves();
sendToNotionDatabase(newSave);
resetTimer();
}

/* --- EDIT SAVE NAME ON THE FLY --- */
function enableNameEdit(id) {
const nameSpan = document.getElementById(`name-${id}`);
const editIcon = document.getElementById(`edit-icon-${id}`);
if (!nameSpan) return;

const currentName = nameSpan.textContent;
const input = document.createElement('input');
input.type = 'text';
input.className = 'save-name-input';
input.value = currentName;

if (editIcon) editIcon.style.display = 'none';

nameSpan.replaceWith(input);
input.focus();
input.select();

const saveNewName = () => {
const newName = input.value.trim() || "Untitled Session";
const gameIndex = savedGames.findIndex(g => g.id === id);
if (gameIndex !== -1) {
savedGames[gameIndex].title = newName;
localStorage.setItem('palace_stopwatch_saves', JSON.stringify(savedGames));
}
renderSaves();
};

input.addEventListener('keydown', (e) => {
if (e.key === 'Enter') saveNewName();
if (e.key === 'Escape') renderSaves();
});

input.addEventListener('blur', saveNewName);
}

function renderSaves() {
saveList.innerHTML = '';

if (savedGames.length === 0) {
saveList.innerHTML = '<li style="text-align:center; font-size:0.75rem; color:#8b001680; padding: 10px;">No records established.</li>';
return;
}

savedGames.forEach(game => {
const li = document.createElement('li');
li.className = 'save-item';
li.innerHTML = `
<div class="save-info">
<div class="save-name-container">
<span class="save-name" id="name-${game.id}" onclick="enableNameEdit(${game.id})" title="Click to rename">${game.title}</span>
<span class="edit-icon" id="edit-icon-${game.id}" onclick="enableNameEdit(${game.id})">✏️</span>
</div>
<span class="save-time">${game.timeStr} (${game.date})</span>
</div>
<div class="save-actions">
<button class="action-btn" onclick="loadGame(${game.id})">Load</button>
<button class="action-btn btn-delete" onclick="deleteGame(${game.id})">✕</button>
</div>
`;
saveList.appendChild(li);
});
}

/* --- LOAD GAME SYSTEM --- */
function loadGame(id) {
const targetGame = savedGames.find(g => g.id === id);
if (!targetGame) return;

clearInterval(timerInterval);
isRunning = false;

elapsedTime = targetGame.ms;
display.innerHTML = targetGame.timeStr;
titleInput.value = targetGame.title;

startBtn.style.display = "block";
startBtn.innerHTML = "Resume";
pauseBtn.style.display = "none";

saveBtn.classList.add('active');
saveBtn.disabled = false;
}

/* --- DELETE GAME SYSTEM (USE CUSTOM MODAL) --- */
function deleteGame(id) {
const targetGame = savedGames.find(g => g.id === id);
if (!targetGame) return;

const title = "🗑️ Delete Record";
const message = `Are you sure you want to permanently delete the record <strong>"${targetGame.title}"</strong>?`;

// เรียกใช้ Custom Modal เพื่อขอยืนยันการลบแบบไม่ใช้ confirm ของเบราว์เซอร์
showCustomModal(title, message, "Delete", function() {
savedGames = savedGames.filter(g => g.id !== id);
localStorage.setItem('palace_stopwatch_saves', JSON.stringify(savedGames));
renderSaves();
});
}

/* --- WEBHOOK TO NOTION (OPTIONAL) --- */
function sendToNotionDatabase(saveData) {
const webhookUrl = 'YOUR_WEBHOOK_URL_HERE';
if (webhookUrl === 'YOUR_WEBHOOK_URL_HERE') return;

fetch(webhookUrl, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
task: saveData.title,
duration: saveData.timeStr,
minutes: Math.round(saveData.ms / 60000),
date: new Date().toISOString().split('T')[0]
})
}).catch(err => console.error('Database Sync Error:', err));
}
</script>

</body>
</html>
