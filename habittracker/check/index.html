<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker & Routine</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --primary-color: #ff3b30; /* ปรับโทนสีตามความชอบของคุณ */
            --accent-blue: #007aff;
            --accent-gold: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .habits-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .habit-block {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            overflow: hidden;
        }

        .habit-block:active {
            transform: scale(0.98);
        }

        .habit-block.checked {
            background-color: rgba(255, 59, 48, 0.1);
            border-color: var(--primary-color);
        }

        .habit-info {
            display: flex;
            align-items: center;
            gap: 16px;
            pointer-events: none; /* ป้องกันการคลิกโดน element ย่อยข้างใน */
        }

        .habit-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .icon-silhouette {
            opacity: 0.4;
        }

        .habit-details h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .habit-details p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .action-overlay {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            font-size: 14px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--text-color);
        }

        /* Webhook Config Form */
        .config-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .config-panel input {
            background-color: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Particle Particle Effect */
        .particle {
            position: absolute;
            pointer-events: none;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Routines</h1>
        </header>

        <!-- แผงตั้งค่า Webhook URL ของ Make.com -->
        <div class="config-panel">
            <label style="font-size: 12px; color: var(--text-muted);">Make.com Webhook URL:</label>
            <input type="text" id="webhook-url-input" placeholder="วาง ลิงก์ Webhook จาก Make ที่นี่..." onchange="updateWebhookURL(this.value)">
        </div>

        <!-- รายการ Habit -->
        <div class="habits-list" id="habits-container"></div>
    </div>

    <script>
        // ใส่ Webhook URL ของ Make.com ตรงนี้ หรือวางในช่องบนหน้าเว็บก็ได้
        let N_WEBHOOK_URL = localStorage.getItem('webhook_url') || "YOUR_WEBHOOK_URL";

        // ข้อมูลเริ่มต้นสำหรับทดสอบ
        let habits = JSON.parse(localStorage.getItem('habits')) || [
            { id: 1, name: "Vocal Practice", category: "Music", icon: "🎤", checked: false },
            { id: 2, name: "Beat Making / Mixing", category: "Production", icon: "🎹", checked: false },
            { id: 3, name: "Workout Routine", category: "Health", icon: "💪", checked: false }
        ];

        // บันทึก Webhook ลง LocalStorage
        function updateWebhookURL(val) {
            N_WEBHOOK_URL = val;
            localStorage.setItem('webhook_url', val);
            console.log("Webhook updated:", val);
        }

        function saveToLocalStorage() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        // ฟังก์ชัน Render หน้าจอ
        function renderHabits() {
            const container = document.getElementById('habits-container');
            container.innerHTML = '';

            habits.forEach(habit => {
                const block = document.createElement('div');
                block.className = `habit-block ${habit.checked ? 'checked' : ''}`;
                block.id = `block-${habit.id}`;
                
                // ใช้ event ดักจากตัว block ใหญ่
                block.addEventListener('click', (e) => toggleCheck(habit.id, e));

                const iconHTML = habit.checked 
                    ? `<span class="habit-icon">🎉</span>` 
                    : `<span class="habit-icon icon-silhouette">${habit.icon}</span>`;

                block.innerHTML = `
                    <div class="habit-info">
                        ${iconHTML}
                        <div class="habit-details">
                            <h3>${habit.name}</h3>
                            <p>${habit.category}</p>
                        </div>
                    </div>
                    <div class="action-overlay">
                        <button class="action-btn edit-btn">✏️</button>
                        <button class="action-btn delete-btn">🗑️</button>
                    </div>
                `;
                container.appendChild(block);
            });

            // ใส่ข้อมูลลิงก์ค้างไว้ในกล่อง Input
            if(N_WEBHOOK_URL && N_WEBHOOK_URL !== "YOUR_WEBHOOK_URL") {
                document.getElementById('webhook-url-input').value = N_WEBHOOK_URL;
            }
        }

        // ฟังก์ชันสลับสถานะการติ๊กถูก
        function toggleCheck(id, event) {
            // ป้องกันถ้าผู้ใช้เผลอไปกดโดนปุ่มแก้ไขหรือลบ (ปุ่มในคลาส action-overlay)
            if (event.target.closest('.action-overlay')) {
                const isDelete = event.target.classList.contains('delete-btn');
                const isEdit = event.target.classList.contains('edit-btn');
                if (isDelete) alert("ระบบลบไอเทม (ฟังก์ชันเสริมของคุณ)");
                if (isEdit) alert("ระบบแก้ไขไอเทม (ฟังก์ชันเสริมของคุณ)");
                return; 
            }

            const habit = habits.find(h => h.id === id);
            if (habit) {
                habit.checked = !habit.checked; // สลับค่า true / false
                saveToLocalStorage(); 
                renderHabits();

                // จะส่งข้อมูลไป Make.com และระเบิดเอฟเฟกต์ "เฉพาะตอนที่ติ๊กถูกสำเร็จ (เป็น true)"
                if (habit.checked) {
                    playSatisfyingDongSound();
                    sendToNotionDatabase(habit);

                    // สร้าง Effect ระเบิดตรงจุดที่คลิก
                    const blockEl = document.getElementById(`block-${id}`);
                    const rect = blockEl.getBoundingClientRect();
                    const clickX = event.clientX - rect.left;
                    const clickY = event.clientY - rect.top;
                    createExplosion(blockEl, clickX, clickY);
                }
            }
        }

        // ฟังก์ชันยิง Webhook ไปหา Make.com เพื่อบันทึกลง Notion
        function sendToNotionDatabase(habit) {
            if (!N_WEBHOOK_URL || N_WEBHOOK_URL === "YOUR_WEBHOOK_URL") {
                console.log("Database Integration Ready: Webhook URL not set yet.");
                return;
            }

            const data = {
                habitId: habit.id,
                habitName: habit.name,
                category: habit.category,
                timestamp: new Date().toISOString(),
                status: "Completed"
            };

            // ใช้ no-cors เพื่อเลี่ยงปัญหาเบราว์เซอร์บล็อกความปลอดภัยเวลาทดสอบแบบ Localhost
            fetch(N_WEBHOOK_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(() => {
                console.log(`[Success] Data sent to Make.com for habit: ${habit.name}`);
            })
            .catch(err => {
                console.error("[Error] Cannot connect to Make.com Webhook:", err);
            });
        }

        // เอฟเฟกต์เสียงตึ๊งตอนทำสำเร็จ (สามารถเปลี่ยนลิงก์เสียงตามชอบได้)
        function playSatisfyingDongSound() {
            try {
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
                audio.volume = 0.4;
                audio.play();
            } catch(e) {
                console.log("Audio play blocked by browser setup.");
            }
        }

        // เอฟเฟกต์ระเบิดสีสันสะใจตอนกดเสร็จ
        function createExplosion(el, x, y) {
            const colors = ['#ff3b30', '#007aff', '#ffcc00', '#4cd964', '#5856d6'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                // สุ่มทิศทางการกระจายตัว
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 40;
                particle.style.setProperty('--x', Math.cos(angle) * velocity + 'px');
                particle.style.setProperty('--y', Math.sin(angle) * velocity + 'px');

                el.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }

        // เริ่มต้นการทำงานของหน้าเว็บ
        renderHabits();
    </script>
</body>
</html>
