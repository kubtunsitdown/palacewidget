<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Red Tracker - DB Ready</title>
    <style>
        :root {
            --palace-red: #9E3640;
            --palace-red-light: rgba(158, 54, 64, 0.1);
            --dark-charcoal: #1a1a1a;
            --bg-cream: #ffffff; 
            --gray-sub: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            overflow-x: hidden;
        }

        .habits-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 550px;
        }

        /* Block Premium Shadow */
        .habit-block {
            width: 100%;
            height: 130px;
            background: var(--bg-cream);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(158, 54, 64, 0.12);
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 24px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.2, 1), box-shadow 0.6s ease;
        }

        .habit-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(158, 54, 64, 0.2);
        }

        /* Status Dot */
        .status-dot {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 6px;
            height: 6px;
            background: var(--palace-red);
            border-radius: 50%;
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        .habit-block.checked .status-dot {
            opacity: 0;
        }

        /* Fluid Slow Fill Animation */
        .fill-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--palace-red);
            border-radius: 16px;
            z-index: 1;
            clip-path: circle(0% at 90% 50%);
            transition: clip-path 0.9s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .habit-block.checked .fill-layer {
            clip-path: circle(130% at 90% 50%);
        }

        /* Content Flex Wrapper */
        .habit-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            gap: 16px;
        }

        .left-core {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        /* Icon Wrapper */
        .icon-box {
            font-size: 2.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            overflow: hidden;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .icon-silhouette {
            position: relative;
            left: -100px;
            filter: drop-shadow(100px 0 0 var(--palace-red));
        }

        .habit-block.checked .icon-box {
            transform: scale(1.18) rotate(-6deg);
            transition-delay: 0.1s;
        }

        /* Text Engine Area */
        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            height: 70px;
            flex: 1;
            min-width: 0;
        }

        /* Layout ก่อนสำเร็จ */
        .uncompleted-layout {
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.2, 1), transform 0.5s cubic-bezier(0.25, 1, 0.2, 1);
            transform: translateY(0);
            opacity: 1;
        }

        .habit-title-row {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 10px;
        }

        .habit-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--palace-red);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-badge {
            font-size: 0.6rem;
            font-weight: 800;
            background: var(--palace-red-light);
            color: var(--palace-red);
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            justify-self: start;
        }

        .message-text {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--dark-charcoal);
            line-height: 1.25;
            letter-spacing: -0.2px;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Layout ตอนสำเร็จ */
        .completed-layout {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: translateY(15px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.2, 1), opacity 0.6s ease;
        }

        .done-message-display {
            font-size: 1.4rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.88);
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-decoration: line-through;
            text-decoration-color: rgba(255, 255, 255, 0.9);
            text-decoration-thickness: 3px;
            margin-top: 4px;
        }

            opacity: 0
