<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Red Cinematic Tracker</title>
    <style>
        :root {
            --palace-red: #9E3640;
            --palace-red-light: rgba(158, 54, 64, 0.1);
            --dark-charcoal: #1a1a1a;
            --bg-cream: #ffffff; 
            --gray-sub: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            overflow-x: hidden;
        }

        .habits-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 550px;
        }

        /* Block Premium Shadow */
        .habit-block {
            width: 100%;
            height: 130px;
            background: var(--bg-cream);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(158, 54, 64, 0.12);
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 24px;
            cursor: pointer;
            overflow: hidden; /* ล็อคอนิเมชันให้อยู่ในบล็อก */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.2, 1), box-shadow 0.4s ease;
        }

        .habit-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(158, 54, 64, 0.2);
        }

        /* Top Corner Status Light */
        .status-dot {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 6px;
            height: 6px;
            background: var(--palace-red);
            border-radius: 50%;
            z-index: 2;
            transition: opacity 0.4s ease;
        }

        .habit-block.checked .status-dot {
            opacity: 0;
        }

        /* Cinematic Slow Fill Animation */
        .fill-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--palace-red);
            border-radius: 16px;
            z-index: 1;
            clip-path: circle(0% at 90% 50%);
            /* ปรับให้ช้าลง หนักแน่น และไหลลื่นขึ้น */
            transition: clip-path 0.85s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .habit-block.checked .fill-layer {
            clip-path: circle(120% at 90% 50%);
        }

        /* Content Flex Area */
        .habit-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            gap: 16px;
        }

        .left-core {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        /* Icon Box Concept */
        .icon-box {
            font-size: 2.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            overflow: hidden;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .icon-silhouette {
            position: relative;
            left: -100px;
            filter: drop-shadow(100px 0 0 var(--palace-red));
        }

        .habit-block.checked .icon-box {
            transform: scale(1.2) rotate(-8deg);
            transition-delay: 0.1s;
        }

        /* Info Layout Dynamic System */
        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            height: 64px;
            flex: 1;
            min-width: 0;
        }

        /* Top Row Components */
        .habit-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.2, 1), transform 0.4s ease;
        }

        .habit-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--palace-red);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-badge {
            font-size: 0.6rem;
            font-weight: 800;
            background: var(--palace-red-light);
            color: var(--palace-red);
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* Main Todo Message */
        .message-text {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--dark-charcoal);
            line-height: 1.25;
            letter-spacing: -0.2px;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 👑 Premium Finished State Layout (โชว์เฉพาะ Name ขยายใหญ่ตรงกลางบล็อก) */
        .finished-name-display {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(20px); /* เฟดลอยขึ้นมาจากด้านล่าง */
            font-size: 1.45rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: -0.2px;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-decoration: line-through;
            text-decoration-color: rgba(255, 255, 255, 0.9);
            text-decoration-thickness: 3px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.2, 1), opacity 0.5s ease;
        }

        /* เมื่อสำเร็จ: ซ่อนองค์ประกอบเดิมออกไป */
        .habit-block.checked .habit-title-row {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .habit-block.checked .message-text {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        /* เมื่อสำเร็จ: เผยข้อความชื่อหลักแทนที่แบบ Cinematic */
        .habit-block.checked .finished-name-display {
            opacity: 1;
            transform: translateY(-50%); /* จัดกึ่งกลางพอดี */
            transition-delay: 0.25s; /* รอให้สีแดงสาดผ่านไปนิดนึงค่อยโผล่ */
        }

        /* Checkbox Mechanism */
        .state-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            z-index: 3;
        }

        .custom-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid var(--palace-red); 
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .habit-block.checked .custom-checkbox {
            border-color: #ffffff;
            background: #ffffff;
            transform: scale(1.1);
        }

        .custom-checkbox::after {
            content: '✓';
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--palace-red);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.2, 1);
        }

        .habit-block.checked .custom-checkbox::after {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.2s;
        }

        /* Overlay Editor */
        .action-overlay {
            position: absolute;
            left: 10px;
            top: -12px;
            display: none;
            gap: 4px;
            z-index: 10;
        }

        .habit-block:hover .action-overlay {
            display: flex;
        }

        .action-btn {
            background: var(--dark-charcoal);
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 99;
        }

        /* Setup Stealth Controls */
        .bottom-controls {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .btn-hidden-trigger {
            width: 12px;
            height: 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .btn-hidden-trigger:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .editor-panel {
            display: none;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .editor-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            gap: 8px;
        }

        .editor-row label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-sub);
        }

        .editor-row input {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.85rem;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="habits-container" id="habits-list"></div>

    <div class="bottom-controls">
        <button class="btn-hidden-trigger" onclick="toggleEditorPanel()"></button>
        
        <div class="editor-panel" id="editor-panel">
            <input type="hidden" id="edit-id" value="">
            <div class="editor-row">
                <label>Icon & Name</label>
                <div style="display: grid; grid-template-columns: 50px 1fr; gap: 6px;">
                    <input type="text" id="habit-icon" value="🎧" style="text-align: center;">
                    <input type="text" id="habit-name" placeholder="E.g., Vocal Mixing">
                </div>
            </div>
            <div class="editor-row">
                <label>Category</label>
                <input type="text" id="habit-category" value="MUSIC">
            </div>
            <div class="editor-row">
                <label>Todo MSG</label>
                <input type="text" id="habit-todo-msg" value="Mix EQ vocal matching the beat!">
            </div>
            <style>.editor-row.disabled-row { opacity: 0.5; pointer-events: none; }</style>
            <div class="editor-row disabled-row">
                <label>Done MSG</label>
                <input type="text" placeholder="Disabled - Replaced by Name" disabled>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px;">
                <button class="action-btn" style="padding:8px;" onclick="saveHabit()">Save</button>
                <button class="action-btn" style="padding:8px; background:#f0f0f0; color:#333;" onclick="resetEditor()">Clear</button>
            </div>
        </div>
    </div>

    <script>
        let habits = [
            {
                id: 1,
                icon: "🎧",
                name: "Vocal Mixing",
                category: "music",
                todoMsg: "Mix EQ vocal matching the beat!",
                checked: false
            },
            {
                id: 2,
                icon: "💧",
                name: "Hydration Status",
                category: "health",
                todoMsg: "Drink at least 2L of Water!",
                checked: false
            }
        ];

        function renderHabits() {
            const list = document.getElementById('habits-list');
            list.innerHTML = '';

            habits.forEach(habit => {
                const block = document.createElement('div');
                block.className = `habit-block ${habit.checked ? 'checked' : ''}`;
                block.id = `block-${habit.id}`;
                block.setAttribute('onclick', `toggleCheck(${habit.id}, event)`);

                const iconHTML = habit.checked 
                    ? `<span>🎉</span>` 
                    : `<span class="icon-silhouette">${habit.icon}</span>`;

                block.innerHTML = `
                    <div class="fill-layer"></div>
                    <div class="status-dot"></div>
                    <div class="action-overlay" onclick="event.stopPropagation();">
                        <button class="action-btn" onclick="loadIntoEditor(${habit.id})">Edit</button>
                        <button class="action-btn" style="background:#cc3333;" onclick="deleteHabit(${habit.id})">Del</button>
                    </div>
                    <div class="habit-content">
                        <div class="left-core">
                            <div class="icon-box">${iconHTML}</div>
                            <div class="info-box">
                                <!-- ส่วนหัวและ Category ก่อนทำเสร็จ -->
                                <div class="habit-title-row">
                                    <span class="habit-name">${habit.name}</span>
                                    <span class="category-badge">${habit.category}</span>
                                </div>
                                <!-- ส่วนข้อความภารกิจหลักก่อนทำเสร็จ -->
                                <div class="message-text">
                                    ${habit.todoMsg}
                                </div>
                                <!-- 👑 ตัวหนังสือที่จะปรากฏเด่นๆ ตรงกลางเมื่อภารกิจสำเร็จ (ดึง Name มาขยายใหญ่) -->
                                <div class="finished-name-display">
                                    ${habit.name}
                                </div>
                            </div>
                        </div>
                        <div class="state-indicator">
                            <div class="custom-checkbox"></div>
                        </div>
                    </div>
                `;
                list.appendChild(block);
            });
        }

        function toggleCheck(id, event) {
            const habit = habits.find(h => h.id === id);
            if (habit) {
                habit.checked = !habit.checked;
                renderHabits();

                if (habit.checked && event) {
                    const blockEl = document.getElementById(`block-${id}`);
                    createExplosion(blockEl, event.clientX, event.clientY);
                }
            }
        }

        function createExplosion(element, clickX, clickY) {
            const rect = element.getBoundingClientRect();
            const originX = clickX ? (clickX - rect.left) : (rect.width / 2);
            const originY = clickY ? (clickY - rect.top) : (rect.height / 2);

            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = i % 2 === 0 ? '#ffffff' : '#ffeb3b'; 
                element.appendChild(particle);

                particle.style.left = `${originX}px`;
                particle.style.top = `${originY}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = 35 + Math.random() * 50;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;

                particle.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1)' },
                    { opacity: 0, transform: `translate(${destinationX}px, ${destinationY}px) scale(0.2)` }
                ], {
                    duration: 600 + Math.random() * 300,
                    easing: 'cubic-bezier(0.25, 1, 0.2, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => particle.remove(), 900);
            }
        }

        function toggleEditorPanel() {
            const panel = document.getElementById('editor-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function loadIntoEditor(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) {
                document.getElementById('edit-id').value = habit.id;
                document.getElementById('habit-icon').value = habit.icon;
                document.getElementById('habit-name').value = habit.name;
                document.getElementById('habit-category').value = habit.category;
                document.getElementById('habit-todo-msg').value = habit.todoMsg;
                document.getElementById('editor-panel').style.display = 'flex';
            }
        }

        function saveHabit() {
            const id = document.getElementById('edit-id').value;
            const icon = document.getElementById('habit-icon').value || "✨";
            const name = document.getElementById('habit-name').value || "New Task";
            const category = document.getElementById('habit-category').value || "LIFE";
            const todoMsg = document.getElementById('habit-todo-msg').value || "Action Required!";

            if (id) {
                const habit = habits.find(h => h.id == id);
                if (habit) {
                    habit.icon = icon;
                    habit.name = name;
                    habit.category = category;
                    habit.todoMsg = todoMsg;
                }
            } else {
                habits.push({
                    id: Date.now(),
                    icon: icon,
                    name: name,
                    category: category,
                    todoMsg: todoMsg,
                    checked: false
                });
            }
            renderHabits();
            resetEditor();
            document.getElementById('editor-panel').style.display = 'none';
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            renderHabits();
            resetEditor();
        }

        function resetEditor() {
            document.getElementById('edit-id').value = '';
            document.getElementById('habit-name').value = '';
            document.getElementById('habit-todo-msg').value = '';
        }

        renderHabits();
    </script>
</body>
</html>
