<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palace Red Tracker - DB Ready</title>
<style>
:root {
  --palace-red: #9E3640;
  --palace-red-light: rgba(158, 54, 64, 0.1);
  --dark-charcoal: #1a1a1a;
  --bg-cream: #ffffff;
  --gray-sub: #666666;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  user-select: none;
}
body {
  background-color: transparent;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  overflow-x: hidden;
}
.habits-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 550px;
}
.habit-block {
  width: 100%;
  height: 130px;
  background: var(--bg-cream);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(158, 54, 64, 0.12);
  position: relative;
  display: flex;
  align-items: center;
  padding: 0 24px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.2, 1), box-shadow 0.6s ease;
}
.habit-block:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(158, 54, 64, 0.2);
}
.status-dot {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 6px;
  height: 6px;
  background: var(--palace-red);
  border-radius: 50%;
  z-index: 5;
  transition: opacity 0.4s ease;
}
.habit-block.checked .status-dot { opacity: 0; }
.fill-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--palace-red);
  border-radius: 16px;
  z-index: 1;
  clip-path: circle(0% at 90% 50%);
  transition: clip-path 0.9s cubic-bezier(0.25, 1, 0.2, 1);
}
.habit-block.checked .fill-layer { clip-path: circle(130% at 90% 50%); }
.habit-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  height: 100%;
  gap: 16px;
}
.left-core { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
.icon-box {
  font-size: 2.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 50px; height: 50px;
  overflow: hidden;
  position: relative;
  transition: transform 0.8s cubic-bezier(0.25, 1, 0.2, 1);
}
.icon-silhouette {
  position: relative;
  left: -100px;
  filter: drop-shadow(100px 0 0 var(--palace-red));
}
.habit-block.checked .icon-box { transform: scale(1.18) rotate(-6deg); transition-delay: 0.1s; }
.info-box { display: flex; flex-direction: column; justify-content: center; position: relative; height: 70px; flex: 1; min-width: 0; }
.uncompleted-layout {
  display: flex;
  flex-direction: column;
  transition: opacity 0.5s cubic-bezier(0.25, 1, 0.2, 1), transform 0.5s cubic-bezier(0.25, 1, 0.2, 1);
  transform: translateY(0);
  opacity: 1;
}
.habit-title-row { display: grid; grid-template-columns: auto 1fr; align-items: center; gap: 10px; }
.habit-name {
  font-size: 0.85rem; font-weight: 700; color: var(--palace-red);
  text-transform: uppercase; letter-spacing: 0.8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.category-badge {
  font-size: 0.6rem; font-weight: 800;
  background: var(--palace-red-light); color: var(--palace-red);
  padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.5px; justify-self: start;
}
.message-text {
  font-size: 1.35rem; font-weight: 800; color: var(--dark-charcoal);
  line-height: 1.25; letter-spacing: -0.2px; margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  overflow: hidden; text-overflow: ellipsis;
}
.completed-layout {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center;
  transform: translateY(15px); opacity: 0; pointer-events: none;
  transition: transform 0.7s cubic-bezier(0.25, 1, 0.2, 1), opacity 0.6s ease;
}
.done-message-display {
  font-size: 1.4rem; font-weight: 800; color: rgba(255, 255, 255, 0.88);
  letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  width: 100%; text-decoration: line-through;
  text-decoration-color: rgba(255, 255, 255, 0.9); text-decoration-thickness: 3px;
  margin-top: 4px;
}
.habit-block.checked .uncompleted-layout { opacity: 0; transform: translateY(-15px); pointer-events: none; }
.habit-block.checked .completed-layout { opacity: 1; transform: translateY(0); transition-delay: 0.25s; }
.habit-block.checked .completed-layout .category-badge { background: rgba(255, 255, 255, 0.2); color: #ffffff; }
.state-indicator { display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 5; }
.custom-checkbox {
  width: 28px; height: 28px; border: 2px solid var(--palace-red); border-radius: 50%;
  background: #fff; display: flex; align-items: center; justify-content: center;
  transition: all 0.5s cubic-bezier(0.25, 1, 0.2, 1);
}
.habit-block.checked .custom-checkbox { border-color: #ffffff; background: #ffffff; transform: scale(1.1); }
.custom-checkbox::after {
  content: '✓'; font-size: 0.95rem; font-weight: 900; color: var(--palace-red);
  opacity: 0; transform: scale(0.5); transition: all 0.4s cubic-bezier(0.25, 1, 0.2, 1);
}
.habit-block.checked .custom-checkbox::after { opacity: 1; transform: scale(1); transition-delay: 0.2s; }
.action-overlay { position: absolute; right: 14px; bottom: 14px; display: none; gap: 6px; z-index: 10; }
.habit-block:hover .action-overlay { display: flex; }
.habit-block.checked:hover .action-overlay { display: none; }
.action-btn {
  background: var(--dark-charcoal); color: white; border: none; padding: 4px 10px;
  font-size: 0.65rem; font-weight: 700; border-radius: 6px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: opacity 0.2s ease, transform 0.2s ease;
}
.action-btn:hover { transform: translateY(-1px); opacity: 0.9; }
.particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 99; }
.bottom-controls { width: 100%; max-width: 550px; display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
.btn-hidden-trigger { width: 12px; height: 12px; background: rgba(0,0,0,0.02); border-radius: 50%; border: none; cursor: pointer; }
.btn-hidden-trigger:hover { background: rgba(0, 0, 0, 0.1); }
.editor-panel {
  display: none; width: 100%; background: #ffffff; border: 1px solid #e5e5e5;
  border-radius: 12px; padding: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  flex-direction: column; gap: 12px; margin-top: 12px;
}
.editor-row { display: grid; grid-template-columns: 100px 1fr; align-items: center; gap: 8px; }
.editor-row label { font-size: 0.75rem; font-weight: 700; color: var(--gray-sub); }
.editor-row input[type="text"] { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; outline: none; }
.sound-setting { border-top: 1px dashed #eee; padding-top: 10px; margin-top: 5px; }
.sound-setting input[type="range"] { cursor: pointer; accent-color: var(--palace-red); }
.webhook-setting { border-top: 1px dashed #eee; padding-top: 10px; margin-top: 5px; }
.webhook-setting input[type="text"] { font-size: 0.72rem; }
.webhook-setting .hint { font-size: 0.65rem; color: var(--gray-sub); margin-top: 4px; grid-column: 1 / -1; }
.webhook-status { font-size: 0.65rem; font-weight: 700; grid-column: 1 / -1; margin-top: 2px; }
.webhook-status.ok { color: #2e7d32; }
.webhook-status.warn { color: var(--palace-red); }
</style>
</head>
<body>

<div class="habits-container" id="habits-list"></div>

<div class="bottom-controls">
  <button class="btn-hidden-trigger" onclick="toggleEditorPanel()"></button>

  <div class="editor-panel" id="editor-panel">
    <input type="hidden" id="edit-id" value="">

    <div class="editor-row">
      <label>Icon & Name</label>
      <div style="display: grid; grid-template-columns: 50px 1fr; gap: 6px;">
        <input type="text" id="habit-icon" value="🎧" style="text-align: center;">
        <input type="text" id="habit-name" placeholder="E.g., Vocal Mixing">
      </div>
    </div>

    <div class="editor-row">
      <label>Category</label>
      <input type="text" id="habit-category" value="MUSIC">
    </div>

    <div class="editor-row">
      <label>Todo MSG</label>
      <input type="text" id="habit-todo-msg" value="Mix EQ vocal matching the beat!">
    </div>

    <div class="editor-row">
      <label>Done MSG</label>
      <input type="text" id="habit-done-msg" value="VOCALS SATISFACTORILY MIXED!">
    </div>

    <!-- 🎚️ Sound Settings Slider -->
    <div class="editor-row sound-setting">
      <label>🔔 Sound Vol.</label>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="range" id="sound-volume" min="0" max="1" step="0.1" value="0.7" onchange="updateVolume(this.value)">
        <span id="vol-txt" style="font-size: 0.75rem; font-weight:700; color:var(--gray-sub);">70%</span>
      </div>
    </div>

    <!-- 🔗 Notion / Make.com Webhook URL -->
    <div class="editor-row webhook-setting">
      <label>🔗 Webhook URL</label>
      <div>
        <input type="text" id="webhook-url" placeholder="https://hook.us2.make.com/xxxxxxxxxxxxxxxxxxxxxxxx">
      </div>
      <div class="hint">
        Paste the Make.com Custom Webhook URL here (Make → your scenario → Webhooks module → "Copy address to clipboard").
        Example shape: https://hook.us2.make.com/anlwop8m5e5xniu2smpkl76ycpxez3i9
      </div>
      <div id="webhook-status" class="webhook-status"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px;">
      <button class="action-btn" style="padding:8px;" onclick="saveHabit()">Save</button>
      <button class="action-btn" style="padding:8px; background:#f0f0f0; color:#333;" onclick="resetEditor()">Clear</button>
    </div>
    <button class="action-btn" style="padding:8px; background:var(--palace-red);" onclick="saveWebhookUrl()">Save Webhook URL</button>
  </div>
</div>

<script>
let globalVolume = parseFloat(localStorage.getItem('habit_sine_volume')) || 0.7;

// 🚨 Default webhook, overridden by whatever is saved in the editor panel (localStorage)
const DEFAULT_WEBHOOK_URL = "https://hook.us2.make.com/anlwop8m5e5xniu2smpkl76ycpxez3i9";

function getWebhookUrl() {
  return localStorage.getItem('habit_webhook_url') || DEFAULT_WEBHOOK_URL;
}

let habits = [
  {
    id: 1,
    icon: "🎧",
    name: "Vocal Mixing",
    category: "music",
    todoMsg: "Mix EQ vocal matching the beat!",
    doneMsg: "VOCALS SATISFACTORILY MIXED!",
    checked: false
  },
  {
    id: 2,
    icon: "💧",
    name: "Hydration Status",
    category: "health",
    todoMsg: "Drink at least 2L of Water!",
    doneMsg: "OPTIMAL HYDRATION ACHIEVED!",
    checked: false
  }
];

// 🎵 Satisfying "dong" sound
function playSatisfyingDongSound() {
  if (globalVolume <= 0) return;
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const ctx = new AudioContext();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, now);
  osc.frequency.exponentialRampToValueAtTime(320, now + 0.12);
  osc.frequency.setValueAtTime(320, now + 0.12);
  gain.gain.setValueAtTime(globalVolume * 0.75, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.85);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.85);
}

// 📡 Send a completed habit to the Notion database (via Make.com webhook)
// Field names below are chosen to match your Notion table columns:
//   Name (title)  <- habit.name
//   Date (date)   <- completedAt
//   habit (select)<- habit.name
//   category (select) <- habit.category
// In Make.com's Notion "Create a Database Item" module, map each Notion
// column to the matching key below (Name -> {{1.name}}, Date -> {{1.completedAt}},
// habit -> {{1.habit}}, category -> {{1.category}}). Notion will automatically
// create a new select option if the value doesn't already exist in that column,
// as long as your Make.com "habit"/"category" field mapping is set to a plain
// text/search value rather than a fixed dropdown choice.
function sendToNotionDatabase(habit) {
  const webhookUrl = getWebhookUrl();

  if (!webhookUrl || webhookUrl === "YOUR_WEBHOOK_URL") {
    console.log("Database Integration Ready: Webhook URL not set yet.");
    return;
  }

  const now = new Date();

  const data = {
    habitId: habit.id,
    name: habit.name,          // -> Notion "Name" (title)
    habit: habit.name,         // -> Notion "habit" (select)
    category: habit.category,  // -> Notion "category" (select)
    date: now.toISOString().slice(0, 10), // -> Notion "Date" (date only, e.g. 2026-07-17)
    completedAt: now.toISOString(),       // full timestamp, in case you want time too
    status: "Completed"
  };

  fetch(webhookUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
    .then(res => console.log("Notion History Created successfully!"))
    .catch(err => console.error("Database communication error:", err));
}

function renderHabits() {
  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  habits.forEach(habit => {
    const block = document.createElement('div');
    block.className = `habit-block ${habit.checked ? 'checked' : ''}`;
    block.id = `block-${habit.id}`;
    block.setAttribute('onclick', `toggleCheck(${habit.id}, event)`);

    const iconHTML = habit.checked
      ? `<span>🎉</span>`
      : `<span class="icon-silhouette">${habit.icon}</span>`;

    block.innerHTML = `
      <div class="fill-layer"></div>
      <div class="status-dot"></div>
      <div class="habit-content">
        <div class="left-core">
          <div class="icon-box">${iconHTML}</div>
          <div class="info-box">
            <div class="uncompleted-layout">
              <div class="habit-title-row">
                <span class="habit-name">${habit.name}</span>
                <span class="category-badge">${habit.category}</span>
              </div>
              <div class="message-text">${habit.todoMsg}</div>
            </div>
            <div class="completed-layout">
              <span class="category-badge">${habit.category}</span>
              <div class="done-message-display">${habit.doneMsg}</div>
            </div>
          </div>
        </div>
        <div class="state-indicator">
          <div class="custom-checkbox"></div>
        </div>
        <div class="action-overlay" onclick="event.stopPropagation();">
          <button class="action-btn" onclick="loadIntoEditor(${habit.id})">Edit</button>
          <button class="action-btn" style="background:#cc3333;" onclick="deleteHabit(${habit.id})">Del</button>
        </div>
      </div>
    `;
    list.appendChild(block);
  });
}

function toggleCheck(id, event) {
  const habit = habits.find(h => h.id === id);
  if (habit) {
    if (event.target.classList.contains('action-btn')) return;
    habit.checked = !habit.checked;
    renderHabits();
    if (habit.checked) {
      playSatisfyingDongSound();
      sendToNotionDatabase(habit);
      if (event) {
        const blockEl = document.getElementById(`block-${id}`);
        createExplosion(blockEl, event.clientX, event.clientY);
      }
    }
  }
}

function createExplosion(element, clickX, clickY) {
  const rect = element.getBoundingClientRect();
  const originX = clickX ? (clickX - rect.left) : (rect.width / 2);
  const originY = clickY ? (clickY - rect.top) : (rect.height / 2);
  for (let i = 0; i < 12; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.background = i % 2 === 0 ? '#ffffff' : 'rgba(255,255,255,0.6)';
    element.appendChild(particle);
    particle.style.left = `${originX}px`;
    particle.style.top = `${originY}px`;
    const angle = Math.random() * Math.PI * 2;
    const velocity = 40 + Math.random() * 40;
    const destinationX = Math.cos(angle) * velocity;
    const destinationY = Math.sin(angle) * velocity;
    particle.animate([
      { opacity: 1, transform: 'translate(0, 0) scale(1)' },
      { opacity: 0, transform: `translate(${destinationX}px, ${destinationY}px) scale(0.3)` }
    ], {
      duration: 600 + Math.random() * 200,
      easing: 'cubic-bezier(0.25, 1, 0.2, 1)',
      fill: 'forwards'
    });
    setTimeout(() => particle.remove(), 800);
  }
}

function toggleEditorPanel() {
  const panel = document.getElementById('editor-panel');
  const isFlex = (panel.style.display === 'flex');
  panel.style.display = isFlex ? 'none' : 'flex';
  if (!isFlex) {
    document.getElementById('sound-volume').value = globalVolume;
    document.getElementById('vol-txt').innerText = `${Math.round(globalVolume * 100)}%`;
    document.getElementById('webhook-url').value = getWebhookUrl();
    showWebhookStatus();
  }
}

function updateVolume(val) {
  globalVolume = parseFloat(val);
  document.getElementById('vol-txt').innerText = `${Math.round(globalVolume * 100)}%`;
  localStorage.setItem('habit_sine_volume', globalVolume);
  playSatisfyingDongSound();
}

function saveWebhookUrl() {
  const val = document.getElementById('webhook-url').value.trim();
  if (val) {
    localStorage.setItem('habit_webhook_url', val);
  } else {
    localStorage.removeItem('habit_webhook_url');
  }
  showWebhookStatus();
}

function showWebhookStatus() {
  const el = document.getElementById('webhook-status');
  const url = getWebhookUrl();
  const usingDefault = url === DEFAULT_WEBHOOK_URL && !localStorage.getItem('habit_webhook_url');
  if (usingDefault) {
    el.textContent = 'Using default webhook URL (edit above to override).';
    el.className = 'webhook-status warn';
  } else {
    el.textContent = 'Custom webhook URL saved ✓';
    el.className = 'webhook-status ok';
  }
}

function loadIntoEditor(id) {
  const habit = habits.find(h => h.id === id);
  if (habit) {
    document.getElementById('edit-id').value = habit.id;
    document.getElementById('habit-icon').value = habit.icon;
    document.getElementById('habit-name').value = habit.name;
    document.getElementById('habit-category').value = habit.category;
    document.getElementById('habit-todo-msg').value = habit.todoMsg;
    document.getElementById('habit-done-msg').value = habit.doneMsg;
    document.getElementById('editor-panel').style.display = 'flex';
  }
}

function saveHabit() {
  const id = document.getElementById('edit-id').value;
  const icon = document.getElementById('habit-icon').value || "✨";
  const name = document.getElementById('habit-name').value || "New Task";
  const category = document.getElementById('habit-category').value || "LIFE";
  const todoMsg = document.getElementById('habit-todo-msg').value || "Action Required!";
  const doneMsg = document.getElementById('habit-done-msg').value || "DONE!";

  if (id) {
    const habit = habits.find(h => h.id == id);
    if (habit) {
      habit.icon = icon;
      habit.name = name;
      habit.category = category;
      habit.todoMsg = todoMsg;
      habit.doneMsg = doneMsg;
    }
  } else {
    habits.push({
      id: Date.now(),
      icon: icon,
      name: name,
      category: category,
      todoMsg: todoMsg,
      doneMsg: doneMsg,
      checked: false
    });
  }

  renderHabits();
  resetEditor();
  document.getElementById('editor-panel').style.display = 'none';
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  renderHabits();
  resetEditor();
}

function resetEditor() {
  document.getElementById('edit-id').value = '';
  document.getElementById('habit-name').value = '';
  document.getElementById('habit-todo-msg').value = '';
  document.getElementById('habit-done-msg').value = '';
}

renderHabits();
</script>
</body>
</html>
