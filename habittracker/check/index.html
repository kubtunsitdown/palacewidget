<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Notion Habit Tracker</title>
    <style>
        :root {
            --palace-red: #9E3640;
            --dark-charcoal: #1e1e1e;
            --bg-block: #ffffff; 
            --gray-sub: #666666;
            --gray-light: #f4f4f4;
            --border-heavy: 3px solid #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent; /* ให้เนียนไปกับ Notion */
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            overflow-x: hidden;
        }

        .habits-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 550px; /* คุมขนาดสูงสุดตามบรีฟเดิม */
        }

        /* Notion-Optimized 550x130 Block Box */
        .habit-block {
            width: 100%;
            height: 130px;
            background: var(--bg-block);
            border: var(--border-heavy);
            border-radius: 16px;
            box-shadow: 5px 5px 0px var(--dark-charcoal); /* เพิ่มมิติแนวสตรีทเท่ๆ ไม่ให้จมหายไปใน Notion */
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 20px;
            cursor: pointer;
            overflow: visible;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
        }

        .habit-block:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--dark-charcoal);
        }

        /* Ultra Smooth Liquid Fill Layer */
        .fill-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--palace-red);
            border-radius: 12px; /* หลบในกรอบ */
            z-index: 1;
            clip-path: circle(0% at 90% 50%);
            transition: clip-path 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .habit-block.checked .fill-layer {
            clip-path: circle(120% at 90% 50%);
        }

        /* Layout Grid */
        .habit-content {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 55px 1fr 35px;
            align-items: center;
            width: 100%;
            height: 100%;
            gap: 8px;
        }

        .icon-box {
            font-size: 2.3rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .habit-block.checked .icon-box {
            transform: scale(1.2) rotate(10deg);
        }

        /* Text Area controls */
        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            height: 100%;
            overflow: hidden;
        }

        .habit-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .habit-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gray-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-badge {
            font-size: 0.6rem;
            font-weight: 800;
            background: var(--gray-light);
            color: #333;
            padding: 1px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* The Prominent Highlight Message Display */
        .message-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--dark-charcoal);
            line-height: 1.25;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Color swap when completed */
        .habit-block.checked .habit-name { color: rgba(255, 255, 255, 0.75); }
        .habit-block.checked .category-badge { background: rgba(255, 255, 255, 0.25); color: #fff; }
        .habit-block.checked .message-text { color: #ffffff; }

        /* UI State Indicators Checkbox */
        .state-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #ccc;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .habit-block.checked .custom-checkbox {
            border-color: #fff;
            background: #fff;
            transform: scale(1.05);
        }

        .custom-checkbox::after {
            content: '✓';
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--palace-red);
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .habit-block.checked .custom-checkbox::after {
            opacity: 1;
            transform: scale(1);
        }

        /* Actions hidden cleanly on hover */
        .action-overlay {
            position: absolute;
            left: 10px;
            top: -12px;
            z-index: 10;
            display: none;
            gap: 4px;
        }

        .habit-block:hover .action-overlay {
            display: flex;
        }

        .action-btn {
            background: var(--dark-charcoal);
            color: white;
            border: none;
            padding: 2px 6px;
            font-size: 0.6rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Fireworks sparks */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 99;
        }

        /* Hidden controls bench */
        .bottom-controls {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .btn-hidden-trigger {
            width: 10px;
            height: 10px;
            background: rgba(0, 0, 0, 0.02);
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn-hidden-trigger:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .editor-panel {
            display: none;
            width: 100%;
            background: #ffffff;
            border: var(--border-heavy);
            border-radius: 12px;
            padding: 14px;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            box-shadow: 4px 4px 0px var(--dark-charcoal);
        }

        .editor-row {
            display: grid;
            grid-template-columns: 90px 1fr;
            align-items: center;
            gap: 6px;
        }

        .editor-row label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .editor-row input {
            border: 2px solid var(--dark-charcoal);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="habits-container" id="habits-list"></div>

    <div class="bottom-controls">
        <button class="btn-hidden-trigger" onclick="toggleEditorPanel()"></button>
        
        <div class="editor-panel" id="editor-panel">
            <input type="hidden" id="edit-id" value="">
            <div class="editor-row">
                <label>Icon & Name</label>
                <div style="display: grid; grid-template-columns: 50px 1fr; gap: 4px;">
                    <input type="text" id="habit-icon" value="🎧" style="text-align: center;">
                    <input type="text" id="habit-name" placeholder="Habit Title">
                </div>
            </div>
            <div class="editor-row">
                <label>Category</label>
                <input type="text" id="habit-category" value="MUSIC">
            </div>
            <div class="editor-row">
                <label>Todo MSG</label>
                <input type="text" id="habit-todo-msg" value="Mix EQ vocal matching the beat!">
            </div>
            <div class="editor-row">
                <label>Done MSG</label>
                <input type="text" id="habit-done-msg" value="VOCALS SATISFACTORILY MIXED!">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 4px;">
                <button class="action-btn" style="padding: 6px;" onclick="saveHabit()">Save</button>
                <button class="action-btn" style="padding: 6px; background:#ddd; color:#000;" onclick="resetEditor()">Clear</button>
            </div>
        </div>
    </div>

    <script>
        let habits = [
            {
                id: 1,
                icon: "🎧",
                name: "Vocal Mixing",
                category: "music",
                todoMsg: "Mix EQ vocal matching the beat!",
                doneMsg: "VOCALS SATISFACTORILY MIXED!",
                checked: false
            },
            {
                id: 2,
                icon: "💧",
                name: "Hydration Status",
                category: "health",
                todoMsg: "Drink at least 2L of Water!",
                doneMsg: "OPTIMAL HYDRATION ACHIEVED!",
                checked: false
            }
        ];

        function renderHabits() {
            const list = document.getElementById('habits-list');
            list.innerHTML = '';

            habits.forEach(habit => {
                const block = document.createElement('div');
                block.className = `habit-block ${habit.checked ? 'checked' : ''}`;
                block.id = `block-${habit.id}`;
                block.setAttribute('onclick', `toggleCheck(${habit.id}, event)`);

                // ถ้าทำเสร็จแล้ว (checked) ให้สลับการแสดงผลไอคอนเป็นพลุ 🎇 ทันทีตามสั่งครับ
                const activeIcon = habit.checked ? "🎇" : habit.icon;

                block.innerHTML = `
                    <div class="fill-layer"></div>
                    <div class="action-overlay" onclick="event.stopPropagation();">
                        <button class="action-btn" onclick="loadIntoEditor(${habit.id})">Edit</button>
                        <button class="action-btn" style="background:#b32424;" onclick="deleteHabit(${habit.id})">Del</button>
                    </div>
                    <div class="habit-content">
                        <div class="icon-box">${activeIcon}</div>
                        <div class="info-box">
                            <div class="habit-title-row">
                                <span class="habit-name">${habit.name}</span>
                                <span class="category-badge">${habit.category}</span>
                            </div>
                            <div class="message-text">
                                ${habit.checked ? habit.doneMsg : habit.todoMsg}
                            </div>
                        </div>
                        <div class="state-indicator">
                            <div class="custom-checkbox"></div>
                        </div>
                    </div>
                `;
                list.appendChild(block);
            });
        }

        function toggleCheck(id, event) {
            const habit = habits.find(h => h.id === id);
            if (habit) {
                habit.checked = !habit.checked;
                renderHabits();

                if (habit.checked && event) {
                    const blockEl = document.getElementById(`block-${id}`);
                    triggerNotionSparks(blockEl, event.clientX, event.clientY);
                }
            }
        }

        function triggerNotionSparks(element, cx, cy) {
            const rect = element.getBoundingClientRect();
            const x = cx ? (cx - rect.left) : (rect.width / 2);
            const y = cy ? (cy - rect.top) : (rect.height / 2);
            const colors = ['#ffffff', '#ffeb3b', '#ff5722', '#4caf50'];

            for (let i = 0; i < 20; i++) {
                const sp = document.createElement('div');
                sp.className = 'sparkle';
                sp.style.background = colors[Math.floor(Math.random() * colors.length)];
                element.appendChild(sp);

                sp.style.left = `${x}px`;
                sp.style.top = `${y}px`;

                const a = Math.random() * Math.PI * 2;
                const v = 30 + Math.random() * 50;
                const dx = Math.cos(a) * v;
                const dy = Math.sin(a) * v;

                sp.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1.2)' },
                    { opacity: 0, transform: `translate(${dx}px, ${dy}px) scale(0.1)` }
                ], {
                    duration: 500 + Math.random() * 300,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => sp.remove(), 900);
            }
        }

        function toggleEditorPanel() {
            const panel = document.getElementById('editor-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function loadIntoEditor(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) {
                document.getElementById('edit-id').value = habit.id;
                document.getElementById('habit-icon').value = habit.icon;
                document.getElementById('habit-name').value = habit.name;
                document.getElementById('habit-category').value = habit.category;
                document.getElementById('habit-todo-msg').value = habit.todoMsg;
                document.getElementById('habit-done-msg').value = habit.doneMsg;
                document.getElementById('editor-panel').style.display = 'flex';
            }
        }

        function saveHabit() {
            const id = document.getElementById('edit-id').value;
            const icon = document.getElementById('habit-icon').value || "✨";
            const name = document.getElementById('habit-name').value || "Unnamed Task";
            const category = document.getElementById('habit-category').value || "LIFE";
            const todoMsg = document.getElementById('habit-todo-msg').value || "Action required!";
            const doneMsg = document.getElementById('habit-done-msg').value || "FINISHED!";

            if (id) {
                const habit = habits.find(h => h.id == id);
                if (habit) {
                    habit.icon = icon;
                    habit.name = name;
                    habit.category = category;
                    habit.todoMsg = todoMsg;
                    habit.doneMsg = doneMsg;
                }
            } else {
                habits.push({
                    id: Date.now(),
                    icon: icon,
                    name: name,
                    category: category,
                    todoMsg: todoMsg,
                    doneMsg: doneMsg,
                    checked: false
                });
            }
            renderHabits();
            resetEditor();
            document.getElementById('editor-panel').style.display = 'none';
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            renderHabits();
            resetEditor();
        }

        function resetEditor() {
            document.getElementById('edit-id').value = '';
            document.getElementById('habit-name').value = '';
        }

        renderHabits();
    </script>
</body>
</html>
